services:
  # Backend API
  - type: web
    name: ubid-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ubid-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Web App
  - type: web
    name: ubid-frontend
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ubid-backend
          property: host

databases:
  - name: ubid-db
    databaseName: ubid
    plan: free
