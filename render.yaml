services:
  # Backend API (Using SQLite)
  - type: web
    name: ubid-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: "sqlite:///./ubid.db"
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Web App
  - type: web
    name: ubid-frontend
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ubid-backend
          property: host
